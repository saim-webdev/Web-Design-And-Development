<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --background-color: #f5f7fa;
            --text-color: #333;
            --light-text: #fff;
        }
        
        * {
            margin: 30px;
            padding: 10px;
        }
        
        body {
            background-color: var(--background-color);
            background-image: url('https://images.unsplash.com/photo-1499678322308-8f3c06d9b7c0?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: -1;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 0;
            border-bottom: 2px solid #e1e4e8;
        }
        
        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .content {
            background: rgba(255, 255, 255, 0.85);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
        }
        
        p {
            margin-bottom: 1rem;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        
        .highlight {
            color: var(--secondary-color);
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <header>
            <h1>Welcome To My Website</h1>
        </header>
        <main>
            <p>Thank you for visiting my website!</p>
            <p>My name is <span class="highlight">Saim Amjad</span>.</p>
            <p>I am a <span class="highlight">Web Developer</span>.</p>
        </main>
    </div>
</body>
</html>
