<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Tasks</title>

    <style>
        p {
            background-color: blue;
        }
        h1, h2, h3 {
            color: red;
            font-weight: bold;
        }
        img {
            width: 200px;
        }
        button {
            background-color: green;
            color: white;
        }
        .box {
            border: 2px solid black;
            padding: 10px;
        }
    </style>

</head>
<body>

<p>This is a paragraph</p>

<h1>Heading 1</h1>
<h2>Heading 2</h2>
<h3>Heading 3</h3>

<img src="download.jpg">

<button>Click Me</button>

<div class="box">This is a box</div>

</body>
</html>
